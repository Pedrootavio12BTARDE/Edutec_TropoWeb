<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro TropoWeb</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/codec-warm-trial" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/nexa" rel="stylesheet">
  <link rel="stylesheet" href="cadastro.css">
</head>

<body>

  <!-- 🔥 MENU DA HOME ADICIONADO AQUI -->
  <header>
    <div class="secao1">

      <a href="../index.html" class="logo">
        <img src="../imagens/logo.png" alt="logo">
      </a>

      <nav class="menu">
        <a href="../conteúdo/conteúdo pagina veado.html">Conteúdo</a>
        <a href="../sobre nos/sobre.html">Sobre Nós</a>
        <a href="../quiz/quiz.html">Quiz</a>
        <a href="../login/login.html">Sign in</a>
      </nav>

    </div>
  </header>
  <!-- 🔥 FIM DO MENU -->

  <main class="container">
    <form id="formCadastro">
      <h1>Cadastro TropoWeb</h1>

      <div class="input-box">
        <input type="text" placeholder="Usuário" required>
        <i class="bx bxs-user"></i>
      </div>

      <div class="input-box">
        <input type="email" placeholder="Email" required>
        <i class="bx bxs-envelope"></i>
      </div>

      <div class="input-box">
        <input type="password" id="senha" placeholder="Senha" required>
        <i class="bx bx-lock-alt"></i>
        <i class="bx bx-show toggleSenha" onclick="togglePassword('senha', this)"></i>
      </div>

      <div class="input-box">
        <input type="password" id="confirmarSenha" placeholder="Confirmar Senha" required>
        <i class="bx bx-lock-alt"></i>
        <i class="bx bx-show toggleSenha" onclick="togglePassword('confirmarSenha', this)"></i>
      </div>

      <button type="submit" class="btn">Cadastrar</button>

      <div class="register-link">
        <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
      </div>
    </form>
  </main>

  <script src="cadastro.js"></script>
</body>
</html>
