<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.cdnfonts.com/css/codec-warm-trial" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/nexa" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
  <title>TropoWeb Login</title>
</head>
<body>

  <!-- 🔥 MENU COPIADO DA HOME E ADAPTADO -->
  <header class="header-login">
    <div class="secao1">

      <a href="../index.html" class="logo">
        <img src="../imagens/logo.png" alt="logo">
      </a>

      <nav class="menu">
        <a href="../conteúdo/conteúdo pagina veado.html">Conteúdo</a>
        <a href="../sobre nos/sobre.html">Sobre Nós</a>
        <a href="../quiz/quiz.html">Quiz</a>
        <a href="../login/login.html">Sign in</a>
      </nav>

    </div>
  </header>

  <!-- 🔥 CONTEÚDO DO LOGIN -->
  <main class="container">
    <form id="formLogin">
      <h1>Login TropoWeb</h1>

      <div class="input-box">
        <input placeholder="Usuário" type="email" required>
        <i class="bx bxs-user"></i>
      </div>

      <div class="input-box">
        <input placeholder="Senha" type="password" id="senhaLogin" required>
        <i class="bx bx-show toggleSenha" onclick="togglePassword('senha', this)"></i>
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox">
          Lembrar senha
        </label>
        <a href="#">Esqueci a senha</a>
      </div>

      <button type="submit" class="login">Login</button>

      <div class="register-link">
        <p>Não tem uma conta? <a href="../login/cadastro.html">Cadastre-se</a></p>
      </div>
    </form>
  </main>

  <script src="login.js"></script>
</body>
</html>
